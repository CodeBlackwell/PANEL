services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - session-data:/app/sessions
      - user-data:/app/users
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - panel

  frontend:
    build: ./frontend
    container_name: panel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - panel
      - web

volumes:
  session-data:
  user-data:

networks:
  panel:
  web:
    external: true
    name: web
